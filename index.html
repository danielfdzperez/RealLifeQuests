<!DOCTYPE html>
<html>
<head>
    <title>Gymcana</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        #map {
            height: 65vh;
        }

        #panel {
            padding: 15px;
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
            max-width: 200px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
        }

        #mensaje {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="panel">
        <p>🔐 Introduce el código:</p>
        <input type="text" id="codigo" placeholder="Código">
        <br>
        <button onclick="comprobarCodigo()">Desbloquear</button>
        <p id="mensaje"></p>
    </div>

    <script>
        var puntos = [];
        var desbloqueados = {};

        // Inicializar mapa
        var map = L.map('map').setView([40.4168, -3.7038], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // Cargar puntos desde JSON automáticamente
        fetch("puntos.json")
        .then(res => res.json())
        .then(data => {
        puntos = data;

        // Leer progreso guardado en localStorage
        var saved = localStorage.getItem("gymcana_desbloqueados");
        if (saved) {
        desbloqueados = JSON.parse(saved);
        }

        // Desbloquear puntos iniciales y guardados
        puntos.forEach(p => {
        if (p.inicio || desbloqueados[p.codigo]) {
        desbloquearPunto(p, false); // false = no guardar otra vez
        }
        });
        });

        // Función para desbloquear un punto
        function desbloquearPunto(p, guardar = true) {
        if (desbloqueados[p.codigo]) return;

        var marker = L.marker(p.coords).addTo(map); // ahora map SI existe
        marker.bindPopup("<h3>" + p.titulo + "</h3><p>" + p.narrativa + "</p>");

        // Animación al nuevo punto
        map.flyTo(p.coords, 15, { duration: 1.5 });

        desbloqueados[p.codigo] = true;

        if (guardar) {
        localStorage.setItem("gymcana_desbloqueados", JSON.stringify(desbloqueados));
        }
        }

        // Comprobar código ingresado
        function comprobarCodigo() {
        var input = document.getElementById("codigo").value.toUpperCase();
        var mensaje = document.getElementById("mensaje");

        var encontrado = puntos.find(p => p.codigo === input);

        if (encontrado) {
        if (desbloqueados[input]) {
        mensaje.innerHTML = "⚠️ Ya desbloqueado";
        } else {
        desbloquearPunto(encontrado);
        mensaje.innerHTML = "✅ Punto desbloqueado";
        }
        document.getElementById("codigo").value = "";
        } else {
        mensaje.innerHTML = "❌ Código incorrecto";
        }

        if (Object.keys(desbloqueados).length === puntos.length) {
        mensaje.innerHTML = "🏆 ¡Gymcana completada!";
        }
        }
    </script>

</body>
</html>
