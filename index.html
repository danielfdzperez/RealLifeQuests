<script>
    var puntos = [];
    var desbloqueados = {};

    //Cargar puntos desde JSON automáticamente
    fetch("puntos.json")
    .then(res => res.json())
    .then(data => {
    puntos = data;

    //Leer progreso guardado en localStorage
    var saved = localStorage.getItem("gymcana_desbloqueados");
    if (saved) {
    desbloqueados = JSON.parse(saved);
    }

    //Desbloquear puntos iniciales y guardados
    puntos.forEach(p => {
    if (p.inicio || desbloqueados[p.codigo]) {
    desbloquearPunto(p, false); // false = no guardar otra vez
    }
    });
    });

    // Función para desbloquear un punto
    function desbloquearPunto(p, guardar = true) {
    if (desbloqueados[p.codigo]) return;

    var marker = L.marker(p.coords).addTo(map);
    marker.bindPopup(
    "<h3>" + p.titulo + "</h3>" +
    "<p>" + p.narrativa + "</p>"
    );

    // Animación al nuevo punto
    map.flyTo(p.coords, 15, { duration: 1.5 });

    desbloqueados[p.codigo] = true;

    // Guardar en localStorage
    if (guardar) {
    localStorage.setItem("gymcana_desbloqueados", JSON.stringify(desbloqueados));
    }
    }

    // Comprobar código ingresado
    function comprobarCodigo() {
    var input = document.getElementById("codigo").value.toUpperCase();
    var mensaje = document.getElementById("mensaje");

    var encontrado = puntos.find(p => p.codigo === input);

    if (encontrado) {
    if (desbloqueados[input]) {
    mensaje.innerHTML = "⚠️ Ya desbloqueado";
    } else {
    desbloquearPunto(encontrado);
    mensaje.innerHTML = "✅ Punto desbloqueado";
    }
    document.getElementById("codigo").value = "";
    } else {
    mensaje.innerHTML = "❌ Código incorrecto";
    }

    if (Object.keys(desbloqueados).length === puntos.length) {
    mensaje.innerHTML = "🏆 ¡Gymcana completada!";
    }
    }
</script>
