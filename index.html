<!DOCTYPE html>
<html>
<head>
    <title>Gymcana</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        #map {
            height: 65vh;
        }

        #panel {
            padding: 15px;
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
            max-width: 200px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
        }

        #mensaje {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="panel">
        <p>🔐 Introduce el código:</p>
        <input type="text" id="codigo" placeholder="Código">
        <br>
        <button onclick="comprobarCodigo()">Desbloquear</button>
        <p id="mensaje"></p>
    </div>

    <script>
        var map = L.map('map', {
        minZoom: 13,
        maxZoom: 16
        }).setView([40.4168, -3.7038], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);


        var puntos = [];
        var desbloqueados = {};

        fetch("puntos.json")
        .then(res => res.json())
        .then(data => {
        puntos = data;

        puntos.forEach(p => {
        if (p.inicio) {
        desbloquearPunto(p);
        }
        });
        });

        function desbloquearPunto(p) {
        if (desbloqueados[p.codigo]) return;

        var marker = L.marker(p.coords).addTo(map);

        marker.bindPopup(
        "<h3>" + p.titulo + "</h3>" +
        "<p>" + p.narrativa + "</p>"
        );

        // 🎥 MOVER MAPA + ZOOM SUAVE
        map.flyTo(p.coords, 15, {
        duration: 1.5
        });

        desbloqueados[p.codigo] = true;
        }

        function comprobarCodigo() {
        var input = document.getElementById("codigo").value.toUpperCase();
        var mensaje = document.getElementById("mensaje");

        var encontrado = puntos.find(p => p.codigo === input);

        if (encontrado) {
        if (desbloqueados[input]) {
        mensaje.innerHTML = "⚠️ Ya desbloqueado";
        } else {
        desbloquearPunto(encontrado);
        mensaje.innerHTML = "✅ Punto desbloqueado";
        }
        document.getElementById("codigo").value = "";
        } else {
        mensaje.innerHTML = "❌ Código incorrecto";
        }

        if (Object.keys(desbloqueados).length === puntos.length) {
        mensaje.innerHTML = "🏆 ¡Gymcana completada!";
        }
        }
    </script>

</body>
</html>
